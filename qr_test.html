<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRテスト</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; color: #eee; font-family: sans-serif; padding: 16px; }
video { width: 100%; max-width: 400px; display: block; margin: 12px auto; border: 2px solid #333; border-radius: 8px; }
canvas { width: 100%; max-width: 400px; display: block; margin: 4px auto; border: 1px solid #444; border-radius: 4px; }
.log { background: #1a1a2e; border-radius: 8px; padding: 12px; margin-top: 12px; font-size: 13px; line-height: 1.8; max-height: 300px; overflow-y: auto; }
.ok  { color: #22c55e; }
.err { color: #ef4444; }
.info{ color: #60a5fa; }
button { background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 16px; font-weight: 700; width: 100%; margin-top: 10px; cursor: pointer; }
#result { background: #0f2; color: #000; border-radius: 8px; padding: 14px; margin-top: 12px; font-size: 14px; font-weight: 700; display: none; word-break: break-all; }
</style>
</head>
<body>
<h2 style="text-align:center;margin-bottom:4px;">QRスキャン診断</h2>
<p style="text-align:center;font-size:12px;color:#888;margin-bottom:12px;">iPhone 11 Pro 動作確認用</p>

<video id="v" playsinline muted autoplay></video>
<canvas id="c"></canvas>
<div id="result"></div>

<button onclick="startTest()">▶ カメラ起動してスキャン</button>
<button onclick="stopTest()" style="background:#ef4444;margin-top:6px;">■ 停止</button>

<div class="log" id="log"></div>

<script>
const log = (msg, cls='info') => {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${new Date().toTimeString().slice(0,8)} ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
};

let stream = null, raf = null, active = false;
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

log('jsQR読込: ' + (typeof jsQR !== 'undefined' ? '✓OK' : '✗失敗'), typeof jsQR !== 'undefined' ? 'ok' : 'err');
log('UserAgent: ' + navigator.userAgent.slice(0,80));

async function startTest() {
  log('カメラ起動開始...');
  try {
    // exact: environment で試行
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      log('背面カメラ取得成功（exact）', 'ok');
    } catch(e1) {
      log('exact失敗: ' + e1.message + ' → idealで再試行', 'err');
      stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: { facingMode: 'environment' }
      });
      log('背面カメラ取得成功（ideal）', 'ok');
    }

    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings();
    log(`解像度: ${settings.width}×${settings.height}`, 'ok');
    log(`カメララベル: ${track.label}`, 'info');

    video.srcObject = stream;
    video.play();
    active = true;

    video.addEventListener('canplay', () => {
      log(`video canplay: ${video.videoWidth}×${video.videoHeight}`, 'ok');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      scanLoop();
    }, { once: true });

    setTimeout(() => {
      if (active && video.videoWidth > 0 && canvas.width !== video.videoWidth) {
        log('canplay未発火 → タイムアウトで強制開始', 'err');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        scanLoop();
      }
    }, 2000);

  } catch(e) {
    log('カメラエラー: ' + e.message, 'err');
  }
}

let frameCount = 0, scanCount = 0;
function scanLoop() {
  if (!active) return;
  frameCount++;

  if (video.readyState >= 2 && video.videoWidth > 0) {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    if (frameCount % 15 === 0) { // 約250ms毎（60fps想定）
      scanCount++;
      if (scanCount <= 3) log(`スキャン試行 #${scanCount} (${canvas.width}×${canvas.height})`);

      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const qr = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });

      if (qr) {
        stopTest();
        log('✓ QR読取成功!', 'ok');
        const r = document.getElementById('result');
        r.style.display = 'block';
        r.textContent = '読取結果: ' + qr.data;
        return;
      }
    }
  } else if (frameCount % 60 === 0) {
    log(`待機中... readyState=${video.readyState} videoWidth=${video.videoWidth}`, 'info');
  }

  raf = requestAnimationFrame(scanLoop);
}

function stopTest() {
  active = false;
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
  log('停止しました');
}
</script>
</body>
</html>
